<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ختمتي - غير متصل</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c32, #2a5a4a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        
        .offline-card {
            background: white;
            border-radius: 35px;
            padding: 45px 35px;
            text-align: center;
            max-width: 400px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.25);
            animation: fadeIn 0.5s ease;
        }
        
        .offline-icon {
            font-size: 80px;
            margin-bottom: 20px;
            display: block;
            animation: pulse 2s ease-in-out infinite;
        }
        
        .offline-card h1 {
            color: #1a4739;
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .offline-card p {
            color: #6c757d;
            line-height: 1.7;
            margin-bottom: 25px;
            font-size: 16px;
        }
        
        .offline-card .retry-btn {
            background: linear-gradient(135deg, #1a4739, #2a6b55);
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
        }
        
        .offline-card .retry-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(26, 71, 57, 0.3);
        }
        
        .offline-card .retry-btn:active {
            transform: scale(0.98);
        }
        
        .offline-card .hint {
            font-size: 13px;
            color: #94a3b8;
            margin-top: 15px;
        }
        
        .offline-card .features {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e9ecef;
        }
        
        .offline-card .features span {
            font-size: 12px;
            color: #6c757d;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        @media (prefers-color-scheme: dark) {
            .offline-card {
                background: #1e293b;
            }
            .offline-card h1 {
                color: #fbbf24;
            }
            .offline-card p {
                color: #94a3b8;
            }
            .offline-card .retry-btn {
                background: linear-gradient(135deg, #fbbf24, #f59e0b);
                color: #0f172a;
            }
            .offline-card .features {
                border-top-color: #334155;
            }
            .offline-card .features span {
                color: #94a3b8;
            }
        }
        
        @media (max-width: 480px) {
            .offline-card {
                padding: 30px 20px;
            }
            .offline-icon {
                font-size: 60px;
            }
            .offline-card h1 {
                font-size: 22px;
            }
            .offline-card p {
                font-size: 14px;
            }
            .offline-card .features {
                flex-direction: column;
                gap: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="offline-card">
        <span class="offline-icon">📡</span>
        <h1>أنت غير متصل بالإنترنت</h1>
        <p>يرجى التحقق من اتصالك بالإنترنت ثم حاول مرة أخرى. يمكنك استخدام التطبيق في وضع عدم الاتصال للميزات الأساسية.</p>
        
        <button class="retry-btn" onclick="location.reload()">
            🔄 إعادة المحاولة
        </button>
        
        <p class="hint">💡 تذكر أن بعض الميزات تتطلب اتصالاً بالإنترنت</p>
        
        <div class="features">
            <span>📖 القرآن الكريم</span>
            <span>📊 تتبع التقدم</span>
            <span>🏆 الإنجازات</span>
        </div>
    </div>
</body>
</html>
